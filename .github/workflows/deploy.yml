name: Cloudflare Pages Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'XShengTech/MEGREZ-docs'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0

      - name: Build
        run: |
          npm install
          npm run docs:build
          cp $PWD/.vitepress/dist/404.html $PWD/.vitepress/dist/errno-404

      - name: Deply
        run: |
          wget https://github.com/qiniu/qshell/releases/download/v2.16.0/qshell-v2.16.0-linux-amd64.tar.gz && tar -zxvf qshell-v2.16.0-linux-amd64.tar.gz && chmod +x qshell
          ./qshell account $QiniuAK $QiniuSK $QiniuBucket
          ./qshell listbucket $QiniuBucket -o filelist.txt
          ./qshell batchdelete --force $QiniuBucket -i filelist.txt || true
          ./qshell qupload2 --src-dir=$PWD/.vitepress/dist --bucket=$QiniuBucket --overwrite --thread-count=8
        env:
          QiniuAK: ${{ secrets.QiniuAK }}
          QiniuSK: ${{ secrets.QiniuSK }}
          QiniuBucket: ${{ secrets.QiniuBucket }}

      - name: Refresh
        run: |
          TOKEN=`echo "/v2/tune/refresh" | openssl dgst -binary -hmac $QiniuSK -sha1 | base64 | tr + - | tr / _`
          curl -X POST -H "Authorization: QBox $QiniuAK:$TOKEN" http://fusion.qiniuapi.com/v2/tune/refresh -d '{"dirs":["https://docs.megrez.xsheng-ai.com/"]}' -H 'Content-Type: application/json'
        env:
          QiniuAK: ${{ secrets.QiniuAK }}
          QiniuSK: ${{ secrets.QiniuSK }}